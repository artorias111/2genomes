chromosomes_units = 1000000

# ─── LINKS ────────────────────────────────────────────────────────────────────
<links>
<link>
file          = LINKS_PATH
radius        = 0.88r
bezier_radius = 0r
thickness     = 1
# Default fallback color
color         = var(color) # make sure the links have colors

</link>
</links>

# ─── IDEOGRAM ─────────────────────────────────────────────────────────────────
<ideogram>
<spacing>
default = 0.002r
<pairwise LAST_SM_CHR FIRST_DM_CHR>
spacing = 10r
</pairwise>
</spacing>

radius           = 0.90r
thickness        = 30p
fill             = yes
stroke_color     = dgrey
stroke_thickness = 2p

show_label       = yes
label_font       = default
label_radius     = dims(ideogram,radius_outer) + 20p
label_size       = 24
label_parallel   = yes
</ideogram>

# ─── IMAGE ────────────────────────────────────────────────────────────────────
<image>
<<include etc/image.conf>>
</image>

# ─── REQUIRED INCLUDES ────────────────────────────────────────────────────────
<<include etc/colors_fonts_patterns.conf>>
<<include etc/housekeeping.conf>>


