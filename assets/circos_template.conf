chromosomes_units = 1000000

# ─── IDEOGRAM ─────────────────────────────────────────────────────────────────
<ideogram>
<spacing>
  default = 0.002r
  <pairwise LAST_REF_CHR FIRST_QRY_CHR>
  spacing = 12r
  </pairwise>
  <pairwise LAST_QRY_CHR FIRST_REF_CHR>
  spacing = 12r
  </pairwise>
</spacing>

radius           = 0.88r
thickness        = 28p
fill             = yes
stroke_color     = dgrey
stroke_thickness = 2p

show_label       = yes
label_font       = default
label_radius     = dims(ideogram,radius_outer) + 30p
label_size       = 18
label_parallel   = yes
label_snuggle         = yes
label_snuggle_refine  = 5
label_snuggle_sampling = 2
label_format     = eval(var(label) =~ s/.*_chr/chr/r)
</ideogram>

# ─── TICKS (scale bars, Mb) ────────────────────────────────────────────────────
<ticks>
radius           = dims(ideogram,radius_outer)
color            = black
thickness        = 2p
multiplier       = 1e-6
format           = %d

<tick>
spacing        = 10u
size           = 12p
show_label     = yes
label_size     = 16p
label_offset   = 5p
format         = %d Mb
</tick>

<tick>
spacing        = 50u
size           = 20p
show_label     = yes
label_size     = 20p
label_offset   = 5p
format         = %d Mb
</tick>
</ticks>

# ─── LINKS ────────────────────────────────────────────────────────────────────
<links>
<link>
file          = LINKS_PATH
radius        = 0.86r
bezier_radius = 0.1r
thickness     = 1
color         = var(color)
</link>
</links>

# ─── IMAGE ────────────────────────────────────────────────────────────────────
<image>
dir   = .
file  = circos.png
radius         = 1500p
background     = white
angle_offset   = -90
auto_alpha_colors = yes
auto_alpha_steps  = 5
</image>

# ─── REQUIRED INCLUDES ────────────────────────────────────────────────────────
<<include etc/colors_fonts_patterns.conf>>
<<include etc/housekeeping.conf>>

